name: Generate Datas

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: generate-pacman-svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?color_snake=#f8d517&color_dots=#ebedf0,#bfd6f6,#8dbdff,#64a1f4,#4b91f1
            dist/pacman-contribution-graph-dark.svg?color_snake=#f8d517&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353&palette=github-dark

      - name: push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
